<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para una dama hermosa</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #050608 100%);
            font-family: 'Georgia', serif;
            color: #fff;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        /* Estrellas animadas */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 600px 600px, 400px 400px, 300px 300px;
            animation: starsMove 80s linear infinite;
            opacity: 0.7;
        }

        @keyframes starsMove {
            from { background-position: 0 0; }
            to { background-position: 800px 800px; }
        }

        .space-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin-top: 140px;
            z-index: 2;
        }

        /* Astronauta */
        .astronaut-wrapper {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            animation: floatAstronaut 4s ease-in-out infinite;
        }

        .astronaut {
            width: 75px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
        }

        /* Globo */
        .balloon-container {
            position: absolute;
            top: -65px;
            right: -25px;
            animation: floatBalloon 3s ease-in-out infinite alternate;
        }

        .heart-balloon {
            background-color: #ff3860;
            height: 50px;
            width: 50px;
            position: relative;
            transform: rotate(-45deg);
            border-radius: 50% 50% 0 0;
            box-shadow: 0 0 20px rgba(255, 56, 96, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-balloon:before {
            content: "";
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #ff3860;
            border-radius: 50%;
            left: 25px;
            top: 0;
        }

        .heart-balloon span {
            transform: rotate(45deg);
            font-size: 0.7rem;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        .balloon-string {
            width: 2px;
            height: 50px;
            background: rgba(255,255,255,0.6);
            margin-top: 15px;
        }

        /* Carta */
        .card {
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeIn 2s ease;
        }

        /* Título */
        .parchment-title {
            background: linear-gradient(135deg, #f4e4c4, #e4cb95);
            color: #4a3319;
            padding: 10px 25px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-radius: 6px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            margin-bottom: 10px;
        }

        /* Subtítulo corregido */
        .subtitle {
            font-size: 1.1rem;
            color: #e4cb95;
            font-style: italic;
            margin-bottom: 25px;
        }

        .poem {
            font-size: 1.2rem;
            line-height: 1.8;
            white-space: pre-line;
        }

        .highlight {
            font-size: 1.7rem;
            font-weight: bold;
            color: #ff6b81;
            display: block;
            margin-top: 15px;
            animation: glow 2s infinite;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes floatAstronaut {
            0%,100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -15px); }
        }

        @keyframes floatBalloon {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        @keyframes glow {
            0%,100% { text-shadow: 0 0 10px #ff6b81; }
            50% { text-shadow: 0 0 25px #ff6b81; }
        }
    </style>
</head>

<body>

<div class="space-container">

    <div class="astronaut-wrapper">
        <svg class="astronaut" viewBox="0 0 64 64">
            <circle cx="32" cy="25" r="16" fill="#e6e6e6"/>
            <rect x="22" y="19" width="20" height="12" rx="6" fill="#2d3748"/>
            <rect x="25" y="21" width="14" height="8" rx="4" fill="#63b3ed" opacity="0.7"/>
            <rect x="18" y="41" width="28" height="20" rx="10" fill="#e6e6e6"/>
        </svg>

        <div class="balloon-container">
            <div class="heart-balloon"><span>Te quiero</span></div>
            <div class="balloon-string"></div>
        </div>
    </div>

    <div class="card">
        <div class="parchment-title">05·07·2026</div>
        <div class="subtitle">Un susurro solo para ti, preciosa mía</div>

        <p class="poem">
Entre destellos de luz y mil estrellas,
tu sonrisa resalta, la más bella.
No hay paisaje, ni obra de arte,
que se compare al arte de mirarte.

<span class="highlight">¡Me encantas!</span>
        </p>
    </div>

</div>

</body>
</html>
