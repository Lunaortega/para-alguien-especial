<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para una dama hermosa</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
    font-family:'Georgia', serif;
    color:white;
}

/* 🌌 FONDO */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 2px, transparent 2px);
    background-size: 120px 120px, 240px 240px;
    animation: stars 120s linear infinite;
    opacity:0.5;
}

@keyframes stars{
    from{transform:translate(0,0);}
    to{transform:translate(-400px,-400px);}
}

/* CONTENEDOR */
.container{
    position:relative;
    width:350px;
    text-align:center;
}

/* 👨‍🚀 ASTRONAUTA MEJORADO */
.astronaut{
    position:relative;
    margin-bottom:20px;
    animation: float 4s ease-in-out infinite;
}

.astronaut svg{
    width:90px;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.7));
}

/* 🎈 GLOBO BIEN POSICIONADO */
.balloon{
    position:absolute;
    top:-60px;
    right:-20px;
    animation: floatBalloon 3s ease-in-out infinite alternate;
}

.heart{
    width:55px;
    height:55px;
    background:#ff3b6b;
    transform: rotate(-45deg);
    position:relative;
    box-shadow:0 0 25px #ff3b6b;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:55px;
    height:55px;
    background:#ff3b6b;
    border-radius:50%;
}

.heart::before{top:-27px;}
.heart::after{left:27px;}

.heart span{
    position:absolute;
    transform: rotate(45deg);
    top:18px;
    left:6px;
    font-size:0.65rem;
    font-weight:bold;
}

.string{
    width:2px;
    height:50px;
    background:white;
    margin:auto;
}

/* 💌 TARJETA */
.card{
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:40px 30px;
    box-shadow:0 0 60px rgba(0,0,0,0.9);
    animation: fade 2s ease;
}

.title{
    font-size:2rem;
    color:#ffd89b;
    text-shadow:0 0 15px #ffd89b;
    margin-bottom:10px;
}

.subtitle{
    font-style:italic;
    margin-bottom:20px;
    color:#ccc;
}

.poem{
    line-height:1.8;
    white-space:pre-line;
}

.highlight{
    color:#ff6b81;
    font-size:1.6rem;
    font-weight:bold;
    animation: glow 2s infinite;
}

/* ANIMACIONES */
@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

@keyframes floatBalloon{
    from{transform:translateY(0);}
    to{transform:translateY(-8px);}
}

@keyframes glow{
    0%,100%{text-shadow:0 0 10px #ff6b81;}
    50%{text-shadow:0 0 30px #ff6b81;}
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

    <!-- 👨‍🚀 -->
    <div class="astronaut">
        <svg viewBox="0 0 64 64">
            <!-- casco -->
            <circle cx="32" cy="22" r="14" fill="#eaeaea"/>
            <circle cx="32" cy="22" r="8" fill="#4fc3f7"/>
            <!-- cuerpo -->
            <rect x="22" y="36" width="20" height="18" rx="10" fill="#eaeaea"/>
            <!-- brazos -->
            <rect x="10" y="38" width="10" height="6" rx="3" fill="#ccc"/>
            <rect x="44" y="38" width="10" height="6" rx="3" fill="#ccc"/>

            <!-- 🎈 -->
        </svg>

        <div class="balloon">
            <div class="heart"><span>Te quiero</span></div>
            <div class="string"></div>
        </div>
    </div>

    <!-- 💌 -->
    <div class="card">
        <div class="title">05·07·2026</div>
        <div class="subtitle">Un susurro solo para ti, preciosa mía</div>

        <div class="poem">
Entre destellos de luz y mil estrellas,
tu sonrisa resalta, la más bella.
No hay paisaje, ni obra de arte,
que se compare al arte de mirarte.

<span class="highlight">¡Me encantas!</span>
        </div>
    </div>

</div>

</body>
</html>
